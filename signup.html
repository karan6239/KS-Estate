<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KS Estate | Sign Up</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
</head>

<body class="min-h-screen overflow-x-hidden">

    <!-- Background -->
    <div class="fixed inset-0 -z-10">
        <img src="https://images.unsplash.com/photo-1600585154340-be6161a56a0c?w=1600"
            class="w-full h-full object-cover">

        <div class="absolute inset-0 bg-[#0F172A]/70 backdrop-blur-sm"></div>
    </div>

    <!-- Logo -->
    <div class="absolute top-8 left-8">
        <a href="index.html">
            <h1 class="text-3xl font-bold text-white">
                KS <span class="text-[#D4AF37]">Estate</span>
            </h1>
        </a>
    </div>

    <!-- Signup Card -->
    <section class="flex items-center justify-center min-h-screen py-10 px-5">

        <div
            class="w-full max-w-lg bg-white/10 backdrop-blur-xl border border-white/20 rounded-3xl shadow-2xl p-8">

            <div class="text-center mb-8">

                <div
                    class="w-20 h-20 rounded-full bg-[#D4AF37] mx-auto flex items-center justify-center mb-5">

                    <i class="fa-solid fa-user-plus text-3xl text-[#0F172A]"></i>

                </div>

                <h2 class="text-4xl font-bold text-white">
                    Create Account
                </h2>

                <p class="text-gray-300 mt-2">
                    Join KS Estate Today
                </p>

            </div>

            <form class="space-y-5">

                <!-- Name -->

                <div>

                    <label class="block text-white mb-2">
                        Full Name
                    </label>

                    <div class="relative">

                        <i
                            class="fa-solid fa-user absolute left-4 top-1/2 -translate-y-1/2 text-[#D4AF37]"></i>

                        <input
                            type="text"
                            placeholder="Enter your full name"
                            class="w-full bg-white/10 border border-white/20 rounded-xl py-3 pl-12 pr-4 text-white placeholder-gray-300 focus:outline-none focus:ring-2 focus:ring-[#D4AF37]">

                    </div>

                </div>

                <!-- Email -->

                <div>

                    <label class="block text-white mb-2">
                        Email
                    </label>

                    <div class="relative">

                        <i
                            class="fa-solid fa-envelope absolute left-4 top-1/2 -translate-y-1/2 text-[#D4AF37]"></i>

                        <input
                            type="email"
                            placeholder="Enter your email"
                            class="w-full bg-white/10 border border-white/20 rounded-xl py-3 pl-12 pr-4 text-white placeholder-gray-300 focus:outline-none focus:ring-2 focus:ring-[#D4AF37]">

                    </div>

                </div>

                <!-- Phone -->

                <div>

                    <label class="block text-white mb-2">
                        Phone Number
                    </label>

                    <div class="relative">

                        <i
                            class="fa-solid fa-phone absolute left-4 top-1/2 -translate-y-1/2 text-[#D4AF37]"></i>

                        <input
                            type="tel"
                            placeholder="Enter phone number"
                            class="w-full bg-white/10 border border-white/20 rounded-xl py-3 pl-12 pr-4 text-white placeholder-gray-300 focus:outline-none focus:ring-2 focus:ring-[#D4AF37]">

                    </div>

                </div>

                <!-- Password -->

                <div>

                    <label class="block text-white mb-2">
                        Password
                    </label>

                    <div class="relative">

                        <i
                            class="fa-solid fa-lock absolute left-4 top-1/2 -translate-y-1/2 text-[#D4AF37]"></i>

                        <input
                            id="password"
                            type="password"
                            placeholder="Create Password"
                            class="w-full bg-white/10 border border-white/20 rounded-xl py-3 pl-12 pr-12 text-white placeholder-gray-300 focus:outline-none focus:ring-2 focus:ring-[#D4AF37]">

                        <button
                            type="button"
                            id="togglePassword"
                            class="absolute right-4 top-1/2 -translate-y-1/2 text-[#D4AF37]">

                            <i class="fa-solid fa-eye"></i>

                        </button>

                    </div>

                </div>

                <!-- Confirm Password -->

                <div>

                    <label class="block text-white mb-2">
                        Confirm Password
                    </label>

                    <div class="relative">

                        <i
                            class="fa-solid fa-lock absolute left-4 top-1/2 -translate-y-1/2 text-[#D4AF37]"></i>

                        <input
                            id="confirmPassword"
                            type="password"
                            placeholder="Confirm Password"
                            class="w-full bg-white/10 border border-white/20 rounded-xl py-3 pl-12 pr-12 text-white placeholder-gray-300 focus:outline-none focus:ring-2 focus:ring-[#D4AF37]">

                        <button
                            type="button"
                            id="toggleConfirm"
                            class="absolute right-4 top-1/2 -translate-y-1/2 text-[#D4AF37]">

                            <i class="fa-solid fa-eye"></i>

                        </button>

                    </div>

                </div>

                <!-- Terms -->

                <label class="flex items-start gap-3 text-gray-300">

                    <input
                        type="checkbox"
                        class="accent-[#D4AF37] mt-1">

                    <span>
                        I agree to the
                        <a href="#" class="text-[#D4AF37] hover:underline">
                            Terms & Conditions
                        </a>
                    </span>

                </label>

                <!-- Button -->

                <button
                    class="w-full bg-[#D4AF37] text-[#0F172A] py-3 rounded-full font-bold text-lg hover:bg-yellow-500 hover:scale-105 transition duration-300">

                    Create Account

                </button>

            </form>

            <!-- Divider -->

            <div class="flex items-center my-8">

                <div class="flex-1 border-t border-white/20"></div>

                <span class="px-4 text-gray-300">
                    OR
                </span>

                <div class="flex-1 border-t border-white/20"></div>

            </div>

            <!-- Google -->

            <button
                class="w-full border border-white/20 rounded-full py-3 text-white hover:bg-white hover:text-black transition">

                <i class="fab fa-google text-red-500 mr-2"></i>

                Sign up with Google

            </button>

            <!-- Login -->

            <p class="text-center text-gray-300 mt-8">

                Already have an account?

                <a href="login.html"
                    class="text-[#D4AF37] font-semibold hover:underline">

                    Login

                </a>

            </p>

        </div>

    </section>

    <script>
        function toggle(inputId, buttonId) {
            const input = document.getElementById(inputId);
            const button = document.getElementById(buttonId);

            button.addEventListener("click", () => {
                const icon = button.querySelector("i");

                if (input.type === "password") {
                    input.type = "text";
                    icon.className = "fa-solid fa-eye-slash";
                } else {
                    input.type = "password";
                    icon.className = "fa-solid fa-eye";
                }
            });
        }

        toggle("password", "togglePassword");
        toggle("confirmPassword", "toggleConfirm");
    </script>

</body>

</html>
